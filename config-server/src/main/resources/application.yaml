server:
  port: ${CONFIG_SERVER_PORT:8888}

spring:
  application:
    name: config-server
  security:
    user:
      name: ${CONFIG_USER:config_user}
      password: ${CONFIG_PASSWORD:config_secret}
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs
        encrypt:
          enabled: false
  profiles:
    active: native


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

logging:
  level:
    org.springframework.cloud.config: DEBUG
