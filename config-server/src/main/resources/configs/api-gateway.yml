server:
  port: ${API_GATEWAY_PORT:8080}

spring:

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret_pass}
      timeout: 3000ms

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"

      routes:


        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authServiceCB
                fallbackUri: forward:/fallback/auth-service
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET,POST
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2



        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/user-service
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET,PUT,PATCH


        - id: flight-service-routes
          uri: lb://flight-service
          predicates:
            - Path=/api/routes/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: flightServiceCB
                fallbackUri: forward:/fallback/flight-service

        - id: flight-service-flights
          uri: lb://flight-service
          predicates:
            - Path=/api/flights/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: flightServiceCB
                fallbackUri: forward:/fallback/flight-service


        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: bookingServiceCB
                fallbackUri: forward:/fallback/booking-service
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET


        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: paymentServiceCB
                fallbackUri: forward:/fallback/payment-service


        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: reviewServiceCB
                fallbackUri: forward:/fallback/review-service
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET


jwt:
  secret: ${JWT_SECRET:bXVsdGktY2l0eS10cmF2ZWwtand0LXNlY3JldC1rZXktMjU2LWJpdHMtbG9uZy1lbm91Z2g=}

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka_user}:${EUREKA_PASSWORD:eureka_secret}@localhost:${EUREKA_SERVER_PORT:8761}/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}


resilience4j:
  circuitbreaker:
    instances:
      authServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
      userServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
      flightServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        minimum-number-of-calls: 5
      bookingServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
      paymentServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 30
        wait-duration-in-open-state: 20s
        minimum-number-of-calls: 5
      reviewServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
  timelimiter:
    instances:
      authServiceCB:
        timeout-duration: 5s
      userServiceCB:
        timeout-duration: 5s
      flightServiceCB:
        timeout-duration: 10s
      bookingServiceCB:
        timeout-duration: 8s
      paymentServiceCB:
        timeout-duration: 10s
      reviewServiceCB:
        timeout-duration: 5s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.project.gateway: DEBUG