server:
  port: ${NOTIFICATION_SERVICE_PORT:8087}

spring:

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:rabbit_user}
    password: ${RABBITMQ_PASSWORD:rabbit_secret_pass}
    virtual-host: ${RABBITMQ_VHOST:travel_vhost}
    listener:
      simple:
        acknowledge-mode: manual

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret_pass}
      timeout: 3000ms

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka_user}:${EUREKA_PASSWORD:eureka_secret}@localhost:${EUREKA_SERVER_PORT:8761}/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

logging:
  level:
    com.project.notificationservice: DEBUG