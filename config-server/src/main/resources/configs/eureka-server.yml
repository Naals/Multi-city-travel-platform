server:
  port: ${EUREKA_SERVER_PORT:8761}

spring:
  security:
    user:
      name: ${EUREKA_USER:eureka_user}
      password: ${EUREKA_PASSWORD:eureka_secret}

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${EUREKA_USER:eureka_user}:${EUREKA_PASSWORD:eureka_secret}@localhost:${EUREKA_SERVER_PORT:8761}/eureka
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
    response-cache-update-interval-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    root: INFO

