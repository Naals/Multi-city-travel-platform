server:
  port: ${REVIEW_SERVICE_PORT:8086}

spring:

  datasource:
    url: jdbc:postgresql://${REVIEW_DB_HOST:localhost}:${REVIEW_DB_PORT:5437}/${REVIEW_DB_NAME:review_db}
    username: ${REVIEW_DB_USER:review_user}
    password: ${REVIEW_DB_PASSWORD:review_secret_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: review-pool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: review-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka_user}:${EUREKA_PASSWORD:eureka_secret}@localhost:${EUREKA_SERVER_PORT:8761}/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.project.reviewservice: DEBUG