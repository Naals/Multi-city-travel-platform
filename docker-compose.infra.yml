version: "3.9"

networks:
  travel-net:
    driver: bridge
    name: travel-net

volumes:
  auth-postgres-data:
  user-postgres-data:
  flight-postgres-data:
  booking-postgres-data:
  payment-postgres-data:
  review-postgres-data:
  redis-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

services:

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_secret_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${AUTH_DB_PORT:-5432}:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth_user} -d ${AUTH_DB_NAME:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-user_db}
      POSTGRES_USER: ${USER_DB_USER:-user_user}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-user_secret_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${USER_DB_PORT:-5433}:5432"
    volumes:
      - user-postgres-data:/var/lib/postgresql/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER:-user_user} -d ${USER_DB_NAME:-user_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-flight:
    image: postgres:16-alpine
    container_name: postgres-flight
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FLIGHT_DB_NAME:-flight_db}
      POSTGRES_USER: ${FLIGHT_DB_USER:-flight_user}
      POSTGRES_PASSWORD: ${FLIGHT_DB_PASSWORD:-flight_secret_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${FLIGHT_DB_PORT:-5434}:5432"
    volumes:
      - flight-postgres-data:/var/lib/postgresql/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FLIGHT_DB_USER:-flight_user} -d ${FLIGHT_DB_NAME:-flight_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-booking:
    image: postgres:16-alpine
    container_name: postgres-booking
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BOOKING_DB_NAME:-booking_db}
      POSTGRES_USER: ${BOOKING_DB_USER:-booking_user}
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_secret_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${BOOKING_DB_PORT:-5435}:5432"
    volumes:
      - booking-postgres-data:/var/lib/postgresql/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOOKING_DB_USER:-booking_user} -d ${BOOKING_DB_NAME:-booking_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME:-payment_db}
      POSTGRES_USER: ${PAYMENT_DB_USER:-payment_user}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment_secret_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${PAYMENT_DB_PORT:-5436}:5432"
    volumes:
      - payment-postgres-data:/var/lib/postgresql/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER:-payment_user} -d ${PAYMENT_DB_NAME:-payment_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-review:
    image: postgres:16-alpine
    container_name: postgres-review
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${REVIEW_DB_NAME:-review_db}
      POSTGRES_USER: ${REVIEW_DB_USER:-review_user}
      POSTGRES_PASSWORD: ${REVIEW_DB_PASSWORD:-review_secret_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${REVIEW_DB_PORT:-5437}:5432"
    volumes:
      - review-postgres-data:/var/lib/postgresql/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REVIEW_DB_USER:-review_user} -d ${REVIEW_DB_NAME:-review_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret_pass}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: travel-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8090:8080"
    networks:
      - travel-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit_secret_pass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-travel_vhost}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9411/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_secret_pass}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
