version: "3.9"

networks:
  travel-net:
    external: true
    name: travel-net

services:

  # ============================================================
  # CONFIG SERVER — Must start before all other services
  # ============================================================
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    image: travel/config-server:latest
    container_name: config-server
    restart: unless-stopped
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    environment:
      CONFIG_SERVER_PORT: 8888
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      ZIPKIN_BASE_URL: http://zipkin:9411
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-config_user}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-config_secret}
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # EUREKA SERVER — Must start before all application services
  # ============================================================
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    image: travel/eureka-server:latest
    container_name: eureka-server
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
    ports:
      - "${EUREKA_SERVER_PORT:-8761}:8761"
    environment:
      EUREKA_SERVER_PORT: 8761
      ZIPKIN_BASE_URL: http://zipkin:9411
    networks:
      - travel-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
