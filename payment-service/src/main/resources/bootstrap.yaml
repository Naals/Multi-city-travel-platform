spring:
  application:
    name: payment-service
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      username: ${CONFIG_SERVER_USER:config_user}
      password: ${CONFIG_SERVER_PASSWORD:config_secret}
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1500
        multiplier: 1.5
        max-interval: 10000