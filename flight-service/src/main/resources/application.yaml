server:
  port: ${FLIGHT_SERVICE_PORT:8083}

spring:
  application:
    name: flight-service
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}

  datasource:
    url: jdbc:postgresql://${FLIGHT_DB_HOST:localhost}:${FLIGHT_DB_PORT:5434}/${FLIGHT_DB_NAME:flight_db}
    username: ${FLIGHT_DB_USER:flight_user}
    password: ${FLIGHT_DB_PASSWORD:flight_secret_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: flight-pool
      maximum-pool-size: 15
      minimum-idle: 3

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret_pass}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

# Dijkstra graph cache TTL
graph:
  cache:
    ttl-minutes: 5
  dijkstra:
    max-stops: 3
    min-layover-minutes: 60

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      flightDb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        minimum-number-of-calls: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.project.flightservice: DEBUG